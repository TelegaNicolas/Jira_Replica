name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: teleganicolas/jira-backend:latest

      - name: Test backend
        run: |
              cd backend
              npm install
              npm test

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/jira_replica
          push: true
          tags: teleganicolas/jira-frontend:latest
          build-args: |
            VITE_API_URL=/api

      - name: Test frontend
        run: |
              cd frontend/jira_replica
              npm install
              npm test