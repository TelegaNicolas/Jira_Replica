services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jira_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jira_db
      DB_USER: postgres
      DB_PASSWORD: password
      JWT_SECRET: supersecretkey
    depends_on:
      - postgres

  frontend:
    build: ./frontend/jira_replica
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: